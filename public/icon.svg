<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="currentColor">
  <!-- Centered barbell for good maskable support -->
  <!-- Bar -->
  <rect x="96" y="224" width="320" height="64" rx="12"/>
  
  <!-- Left plate -->
  <rect x="48" y="144" width="80" height="224" rx="20"/>
  <rect x="64" y="168" width="48" height="176" rx="10" fill="#fff"/>
  
  <!-- Right plate -->
  <rect x="384" y="144" width="80" height="224" rx="20"/>
  <rect x="400" y="168" width="48" height="176" rx="10" fill="#fff"/>
  
  <!-- Progress / track marks (representing data tracking) -->
  <rect x="160" y="200" width="16" height="112" rx="4" fill="#fff"/>
  <rect x="200" y="184" width="16" height="144" rx="4" fill="#fff"/>
  <rect x="240" y="208" width="16" height="96" rx="4" fill="#fff"/>
  <rect x="280" y="192" width="16" height="128" rx="4" fill="#fff"/>
  <rect x="320" y="200" width="16" height="112" rx="4" fill="#fff"/>
</svg>

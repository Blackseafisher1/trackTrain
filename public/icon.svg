  <rect x="380" y="184" width="48" height="144" rx="8" fill="#fff"/>
  
  <!-- Track marks (data / progress) -->
  <rect x="168" y="216" width="12" height="80" rx="3" fill="#fff"/>
  <rect x="200" y="208" width="12" height="96" rx="3" fill="#fff"/>
  <rect x="232" y="216" width="12" height="80" rx="3" fill="#fff"/>
  <rect x="264" y="212" width="12" height="88" rx="3" fill="#fff"/>
  <rect x="296" y="216" width="12" height="80" rx="3" fill="#fff"/>
